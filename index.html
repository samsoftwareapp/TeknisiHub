<body>
  <main class="shell">
    <section class="hero">
      <div class="status-card">
        <div>
          <p class="label">Local service</p>
          <strong id="serviceStatus">Mengecek koneksi...</strong>
        </div>
        <button id="refreshButton" type="button">Refresh status</button>
      </div>
    </section>

    <section class="panel">

      </div>

      <dl class="facts">
        <div>
          <dt>Bot</dt>

        </div>

          <dt>Channel wajib</dt>

      <div id="notice" class="notice">Menunggu local service aktif.</div>

      <form id="phoneForm" class="form">
        <label for="phoneNumber">Nomor Telegram</label>
        <input id="phoneNumber" name="phoneNumber" type="tel" placeholder="+628xxxx">
        <button type="submit">Minta kode login</button>
      </form>

      <form id="codeForm" class="form hidden">
        <label for="verificationCode">Kode verifikasi</label>
        <input id="verificationCode" name="verificationCode" type="text" placeholder="12345">
        <button type="submit">Kirim kode</button>
      </form>

      <form id="passwordForm" class="form hidden">
        <label for="password">Password 2FA Telegram</label>
        <input id="password" name="password" type="password" placeholder="Password Telegram">
        <button type="submit">Selesaikan login</button>
      </form>

      <div id="agreementPanel" class="agreement hidden">
        <label class="checkline">
          <input id="agreeCheckbox" type="checkbox">
          <span>Saya setuju hanya menggunakan file dan tools sesuai izin akses TeknisiHub.</span>
        </label>
        <button id="agreeButton" type="button">Simpan persetujuan</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
